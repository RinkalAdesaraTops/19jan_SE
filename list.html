<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
</head>
<body>
    <!-- order unorder description list -->
     <dl>
        <dt>HTML</dt>
        <dd>It stands for Hypertext Markup language</dd>
        <dd>2 types of tags </dd>
     </dl>
     <hr>
     <!-- type- 1,A,a,I,i -->
     <ol type="1" start="101" reversed>
        <li>Abc</li>
        <li>Xyz</li>
        <li>Pqr</li>
     </ol>
     <ol type="A" start="7">
        <li>Abc</li>
        <li>Xyz</li>
        <li>Pqr</li>
     </ol>
     <ol type="a">
        <li>Abc</li>
        <li>Xyz</li>
        <li>Pqr</li>
     </ol>
     <ol type="I">
        <li>Abc</li>
        <li>Xyz</li>
        <li>Pqr</li>
     </ol>
     <ol type="i" start="8">
        <li>Abc</li>
        <li>Xyz</li>
        <li>Pqr</li>
     </ol>
     <hr>
    <ul type="disc">
        <li>Abc</li>
        <li>Xyz</li>
        <li>Pqr</li>
    </ul>
    <ul type="circle">
        <li>Abc</li>
        <li>Xyz</li>
        <li>Pqr</li>
    </ul>
    <ul type="square">
        <li>Abc</li>
        <li>Xyz</li>
        <li>Pqr</li>
    </ul>
    <ul type="none">
        <li>Abc</li>
        <li>Xyz</li>
        <li>Pqr</li>
    </ul>
</body>
</html>
