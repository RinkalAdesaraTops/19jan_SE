<html>
    <head>
        <title>My first page</title>
    </head>
    <body>
        <!-- direction = left right up down -->
        <!-- behavior = scroll slide  alternate-->
        <!--scrollamount & scrolldelay  -->
        <marquee behavior="alternate" direction="right" bgcolor="green" height="300px" width="500px" vspace="10" hspace="20" loop="3" scrolldelay="200">This is text</marquee>
        <!-- paired tag -->
        <h1>Heading1</h1>
        <h2>Heading1</h2>
        <h3>Heading1</h3>
        <h4>Heading1</h4>
        <h5>Heading1</h5>
        <h6>Heading1</h6>
        <!-- unpaired tag -->
        <hr> 
        <b>Bold</b><br>
        <strong>Bold</strong><br>
        <i>Italic</i><br>
        <em>Italic</em><br>
        <u>Underline</u><br>
        <ins>Underline</ins><br>
        <mark>Highlight</mark><br>
        12<sup>th</sup><br>
        H<sub>2</sub>O<br> 
        <del>No parking</del><br>
        <s>No smoking</s><br>
    </body>
</html>
