<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#" method="post">
        <label for="">Name:</label>
        <!-- <input type="text" name="name" id="name" minlength="2" maxlength="10" required><br><br> -->
        <input type="text" name="name" id="name" pattern="[A-Za-z]{2,10}" required> <br><br>
        <label for="">Age:</label>
        <input type="number" name="no" id="no" min="18" max="60" required> <br><br>
        <label for="">Email:</label>
        <input type="email" name="email" id="email" required> <br><br>
        <label for="">Password:</label>
        <input type="password" name="pwd" id="pwd" required> <br><br>      
        <label for="">Range:</label>
        <input type="range" name="rg" id="rg"> <br><br>
        <label for="">Color:</label>
        <input type="color" name="clr" id="clr"> <br><br>
        <label for="">Telephone:</label>
        <input type="tel" name="tel" id="tel" pattern="[0-9]{10,12}"> <br><br>
        <label for="">Gender</label>
        <input type="radio" name="g1" id="" value="male">Male
        <input type="radio" name="g1" id="" value="female">Female
        <br><br>
        <label for="">Qualification:</label>
        <input type="checkbox" name="q1" id="" value="10">10th
        <input type="checkbox" name="q1" id="" value="12">12th
        <input type="checkbox" name="q1" id="" value="bca">BCA
        <input type="checkbox" name="q1" id="" value="mca">MCA
        <br><br>
        <label for="">Country:</label>
        <select name="country" id="">
            <option value="">India</option>
            <option value="">Canada</option>
            <option value="">UK</option>
            <option value="">USA</option>
        </select>
        <br><br>
        <label for="">Address</label>
        <textarea name="address" id="" rows="10" cols="40"></textarea>
        <br><br>
        <input type="button" value="Button">
        <input type="submit" value="Save">
        <input type="reset" value="Clear">
    </form>
</body>
</html>
